name: Build Android + Flutter Images

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/davidmartos96
  DOCKER_TAG: stable
  FLUTTER_VERSION: 3.41.9

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # ANDROID IMAGE
      # =========================
      - name: Build Android SDK (no push except master)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sdk/Dockerfile.android
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ env.REGISTRY }}/android-sdk:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=android
          cache-to: type=gha,scope=android,mode=max

      # =========================
      # FLUTTER IMAGE
      # =========================
      - name: Build Flutter image (no push except master)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sdk/Dockerfile.flutter
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/flutter:${{ env.FLUTTER_VERSION }}
            ${{ env.REGISTRY }}/flutter:${{ env.DOCKER_TAG }}
          build-args: |
            flutter_version=${{ env.FLUTTER_VERSION }}
          platforms: linux/amd64
          cache-from: type=gha,scope=flutter
          cache-to: type=gha,scope=flutter,mode=max